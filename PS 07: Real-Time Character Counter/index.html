<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Character Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      width: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10 10 5 5 px;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: none;
    }

    .stats {
      margin-top: 10px;
      font-size: 14px;
    }

    .warning {
      color: red;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Character Counter</h2>

  <textarea id="text" maxlength="200" placeholder="Type here..."></textarea>

  <div class="stats">
    <p>Characters: <span id="charCount">0</span>/200</p>
    <p>Words: <span id="wordCount">0</span></p>
    <p id="remainingText">Remaining: 200</p>
  </div>

  <button onclick="clearText()">Clear</button>
</div>

<script>
  const textArea = document.getElementById("text");
  const charCount = document.getElementById("charCount");
  const wordCount = document.getElementById("wordCount");
  const remainingText = document.getElementById("remainingText");

  textArea.addEventListener("input", () => {
    const text = textArea.value;

    // Character count
    charCount.textContent = text.length;

    // Word count
    const words = text.trim().split(/\s+/).filter(word => word.length > 0);
    wordCount.textContent = text.trim() === "" ? 0 : words.length;

    // Remaining characters
    const remaining = 200 - text.length;
    remainingText.textContent = "Remaining: " + remaining;

    // Change color when <= 20
    if (remaining <= 20) {
      remainingText.classList.add("warning");
    } else {
      remainingText.classList.remove("warning");
    }
  });

  function clearText() {
    textArea.value = "";
    charCount.textContent = 0;
    wordCount.textContent = 0;
    remainingText.textContent = "Remaining: 200";
    remainingText.classList.remove("warning");
  }
</script>

</body>
</html>
